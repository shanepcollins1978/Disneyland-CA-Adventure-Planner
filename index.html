<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Disneyland Park Hopper Planner</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#0b1f3f">
</head>

<body>

<div class="app">

<header class="hero">
  <h1>Disneyland Park Hopper Planner</h1>
  <p>
    Build your perfect Disneyland and California Adventure day with
    Lightning Lane, Single Rider, dining, and ride planning.
  </p>
</header>

<!-- Attraction Filters -->

<section class="panel">
  <h2>Attraction Filters</h2>

  <div class="filter-row">
    <label for="parkFilter">Park</label>

    <select id="parkFilter">
      <option value="all">All Parks</option>
      <option value="Disneyland">Disneyland</option>
      <option value="California Adventure">California Adventure</option>
    </select>
  </div>

  <div id="attractionFilters"></div>
</section>

<!-- Ride Picker -->

<section class="panel">
  <div id="ridePicker"></div>
</section>

<!-- Dining Planner -->

<section class="panel">
  <div id="diningPlanner"></div>
</section>

<!-- Recommended Ride Order -->

<section class="panel">
  <div id="recommendedRideOrder"></div>
</section>

</div>

<script src="script.js"></script>

</body>
</html>
